# example-lib: Button component set (has deps on icons via INSTANCE)
button_set:
  figma_file: example_lib
  node_id: "1:100"
  name: Button
  description: A reusable button
  figma_file_key: 75U91YIrYa65xhYcM0olH5
  figma_file_name: example-lib
  is_root: false
  slots: []
  prop_definitions:
    Size:
      type: VARIANT
      defaultValue: M
    State:
      type: VARIANT
      defaultValue: default

# example-lib: VStack root container
vstack_set:
  figma_file: example_lib
  node_id: "1:500"
  name: VStack
  description: Vertical stack layout container
  figma_file_key: 75U91YIrYa65xhYcM0olH5
  figma_file_name: example-lib
  is_root: true
  slots:
    - name: children
      allowed_children: ["Button", "Badge"]
  prop_definitions:
    Size:
      type: VARIANT
      defaultValue: m

