# Button default variant — contains INSTANCE reference to icon_arrow
button_default:
  component_set: button_set
  node_id: "1:101"
  name: "Size=M, State=default"
  is_default: true
  figma_json:
    id: "1:101"
    type: COMPONENT
    name: "Size=M, State=default"
    children:
      - id: "1:110"
        type: FRAME
        name: button-inner
        children:
          - id: "1:111"
            type: INSTANCE
            name: IconArrow
            componentId: "2:101"
            children:
              - id: "I1:111;2:102"
                type: VECTOR
                name: arrow-vector
          - id: "1:112"
            type: TEXT
            name: label
            characters: Click me
  react_code: "function Button() { return <button>Click me</button>; }"
  react_code_compiled: "window.Button = function() { return React.createElement('button', null, 'Click me'); }"

